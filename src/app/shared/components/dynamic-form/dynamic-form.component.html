<section class="form-overlay">
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="form-panel"
  >
    <div class="form-panel-header">
      <h2 class="form-panel-title">{{ config.title }}</h2>
      <button type="button" (click)="onCancel()" class="form-close-btn" aria-label="Close">
        <i class="bi bi-x-circle text-2xl"></i>
      </button>
    </div>

    @if (validationError) {
      <p class="form-error">{{ validationError }}</p>
    }

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      @for (field of config.fields; track field.field) {
        <div class="flex flex-col" [ngClass]="fieldColClass(field)">
          <label [for]="field.field" class="form-label">{{ field.label }}</label>

          @switch (field.type) {
            @case ('select') {
              <select
                [id]="field.field"
                [formControlName]="field.field"
                class="clinical-input"
                [class.input-invalid]="isInvalid(field.field)"
              >
                <option value="" disabled>{{ field.placeholder ?? 'Select...' }}</option>
                @for (opt of field.options; track opt.value) {
                  <option [value]="opt.value">{{ opt.label }}</option>
                }
              </select>
            }
            @case ('textarea') {
              <textarea
                [id]="field.field"
                [formControlName]="field.field"
                [placeholder]="field.placeholder ?? ''"
                rows="3"
                class="clinical-input"
                [class.input-invalid]="isInvalid(field.field)"
              ></textarea>
            }
            @case ('file') {
              <input
                type="file"
                [id]="field.field"
                (change)="onFileChange(field, $event)"
                class="clinical-input"
              />
            }
            @default {
              <input
                [id]="field.field"
                [type]="field.type"
                [formControlName]="field.field"
                [placeholder]="field.placeholder ?? ''"
                [min]="field.min"
                [readonly]="field.readonly"
                class="clinical-input"
                [class.input-invalid]="isInvalid(field.field)"
              />
            }
          }
        </div>
      }
    </div>

    <div class="form-actions">
      <app-button type="submit" variant="primary">{{ submitLabel() }}</app-button>
      <app-button type="button" variant="danger" (clicked)="onCancel()">Cancel</app-button>
    </div>
  </form>
</section>
