<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
  <div
    class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl animate-scaleIn"
  >
    <h3 class="text-lg font-semibold text-gray-900">
      {{ title }}
    </h3>

    <p class="mt-2 text-sm text-gray-600">
      {{ message }}
    </p>

    <div class="mt-6 flex justify-end gap-3">
      <button
        (click)="onCancel()"
        class="rounded-lg bg-gray-200 px-4 py-2 text-sm font-medium text-gray-800 hover:bg-gray-300 transition"
      >
        {{ cancelText }}
      </button>

      <button
        (click)="onConfirm()"
        class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition"
      >
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>
