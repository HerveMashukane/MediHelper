<nav class="sticky top-0 z-50 flex items-center justify-between px-8 py-3 bg-gray-900 shadow-md shadow-black text-white">

  <!-- LEFT : Logo -->
  <div
    routerLink="/dashboard"
    class="flex items-center space-x-2 cursor-pointer hover:scale-105 transition"
  >
    <img
      src="branding/logo.svg"
      alt="MediHelp Logo"
      class="h-10 w-auto object-contain drop-shadow-[0_0_6px_rgba(59,130,246,0.35)] select-none"
    />
  </div>


  <!-- CENTER : Search -->
  <div class="relative w-1/3">
    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <input
      type="text"
      placeholder="Search patients, doctors, appointments..."
      class="w-full pl-10 pr-4 py-2 bg-gray-900 border border-slate-400 rounded-lg text-sm focus:outline-none focus:border-sky-600 focus:ring-1 focus:ring-sky-600 transition"
    />
  </div>


  <!-- RIGHT : Actions -->
  <div class="flex items-center gap-6">

    <!-- Theme toggle -->
    <button class="text-xl text-gray-400 hover:text-yellow-400 transition">
      <i class="bi bi-sun"></i>
    </button>

    <!-- Notifications -->
    <button class="relative bg-gray-900 p-2 rounded-lg hover:bg-gray-800 transition">
      <i class="bi bi-bell text-yellow-400"></i>
      <span class="absolute -top-1 -right-1 bg-red-500 text-xs px-1 rounded-full">
        3
      </span>
    </button>

    <!-- Language -->
    <select class="bg-sky-500 text-white text-sm px-2 py-1 rounded-full cursor-pointer hover:bg-sky-600 transition">
      <option>🇬🇧 EN</option>
      <option>🇫🇷 FR</option>
    </select>

    <!-- Profile -->
    <div class="flex items-center gap-3 relative">

      <!-- Avatar -->
      <div class="relative">
        <img
          src="/assets/images/herve.jpg"
          (click)="toggleDropdown()"
          class="w-10 h-10 rounded-full object-cover border border-gray-700 cursor-pointer"
          alt="User"
        />

        <!-- Online indicator -->
        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-gray-950 rounded-full"></span>
      </div>

      <!-- Name visible directly -->
      <div 
        class="hidden md:block text-left leading-tight cursor-pointer animate-pageFlip"
        (click)="toggleDropdown()">
        <p class="text-sm font-semibold">Hervé Mashukane</p>
        <p class="text-xs text-sky-500">MediHelper Admin</p>
      </div>

      <!-- Dropdown -->
      <div
        *ngIf="isDropdownOpen"
        class="absolute right-0 top-14 w-64 bg-gray-900 border border-gray-700 rounded-lg shadow-lg z-50 overflow-hidden"
      >

        <!-- HEADER -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700">

          <!-- User info -->
          <div class="flex items-center gap-3">
            <img
              src="/assets/images/herve.jpg"
              class="w-10 h-10 rounded-full object-cover border border-gray-700"
              alt="User"
            />

            <div>
              <p class="text-sm font-semibold leading-none">Hervé Mashukane</p>
              <p class="text-xs text-sky-500">Super Admin</p>
            </div>
          </div>

          <!-- Close -->
          <button
            (click)="toggleDropdown()"
            class="text-gray-400 hover:text-red-500 transition"
          >
            <i class="bi bi-x-lg text-sm"></i>
          </button>

        </div>

        <!-- MENU -->
        <a class="block px-4 py-2 hover:bg-gray-800 cursor-pointer">
          Profile
        </a>

        <a class="block px-4 py-2 hover:bg-gray-800 cursor-pointer">
          Settings
        </a>

        <a class="block px-4 py-2 hover:bg-gray-800 cursor-pointer text-red-400">
          Logout
        </a>

      </div>

    </div>

  </div>
</nav>
