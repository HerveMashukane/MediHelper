<nav class="navbar">

  <!-- LEFT : Logo -->
  <div
    [routerLink]="dashboardLink()"
    class="flex items-center space-x-2 cursor-pointer transition hover:opacity-90"
  >
    <img
      src="branding/logo.svg"
      alt="MediHelp Logo"
      class="h-10 w-auto object-contain select-none"
    />
  </div>


  <!-- CENTER : Search -->
  <div class="relative w-1/3">
    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-clinical-muted"></i>

    <input
      type="search"
      placeholder="Search patients, doctors, appointments..."
      class="navbar-search"
    />
  </div>


  <!-- RIGHT : Actions -->
  <div class="flex items-center gap-6">

    <!-- Theme toggle -->
    <button class="navbar-icon-btn text-xl text-clinical-muted">
      <i class="bi bi-sun"></i>
    </button>

    <!-- Notifications -->
    <button class="navbar-icon-btn relative">
      <i class="bi bi-bell text-warning"></i>
      <span class="navbar-badge">3</span>
    </button>

    <!-- Language -->
    <select class="btn-primary btn-sm cursor-pointer">
      <option>🇬🇧 EN</option>
      <option>🇫🇷 FR</option>
    </select>

    <!-- Profile -->
    <div class="flex items-center gap-3 relative">

      <!-- Avatar -->
      <div class="relative">
        <img
          src="/assets/images/herve.jpg"
          (click)="toggleDropdown()"
          class="avatar w-10 h-10 cursor-pointer"
          alt="User"
        />

        <!-- Online indicator -->
        <span
          class="absolute bottom-0 right-0 w-3 h-3 border-2 border-surface-0 rounded-full"
          [ngClass]="(isOnline$ | async) ? 'connection-dot-online' : 'connection-dot-offline'"
        ></span>
      </div>

      <!-- Name visible directly -->
      <div
        class="hidden md:block text-left leading-tight cursor-pointer animate-pageFlip"
        (click)="toggleDropdown()"
      >
        <p class="text-sm font-semibold">{{ displayName() }}</p>
        <p class="text-xs text-clinical-accent">MediHelper {{ roleLabel() }}</p>
      </div>

      <!-- Dropdown -->
      <div *ngIf="isDropdownOpen" class="nav-dropdown">

        <!-- HEADER -->
        <div class="nav-dropdown-header">

          <!-- User info -->
          <div class="flex items-center gap-3">
            <img
              src="/assets/images/herve.jpg"
              class="avatar w-10 h-10"
              alt="User"
            />

            <div class="space-y-1">
              <p class="text-sm leading-none">{{ displayMail() }}</p>
              <p class="text-sm text-clinical-accent">{{ roleLabel() }}</p>
            </div>
          </div>

          <!-- Close -->
          <button (click)="toggleDropdown()" class="text-clinical-muted transition hover:opacity-90">
            <i class="bi bi-x-lg text-sm"></i>
          </button>

        </div>

        <!-- MENU -->
        <a class="nav-dropdown-item">Profile</a>
        <a class="nav-dropdown-item">Settings</a>
        <button type="button" (click)="logout()" class="nav-dropdown-item-danger">
          Logout
        </button>

      </div>

    </div>

  </div>
</nav>
