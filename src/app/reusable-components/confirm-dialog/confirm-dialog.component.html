<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/70">
  <div
    class="w-full max-w-sm rounded-2xl bg-gray-900 p-6 shadow-xl animate-fadeIn"
  >
    <h3 class="text-lg font-semibold text-white">
      {{ title }}
    </h3>

    <p class="mt-2 text-sm text-gray-400">
      {{ message }}
      <span
          *ngIf="hightlight"
          class="font-semibold text-white"
        >
        {{ hightlight }}
      </span>
      ? This action cannot be undone!
    </p>

    <div class="mt-6 flex justify-end gap-3">
      <button
        (click)="onCancel()"
        class="rounded-lg bg-gray-200 px-4 py-2 text-sm font-medium text-gray-800 hover:bg-gray-300 transition"
      >
        {{ cancelText }}
      </button>

      <button
        (click)="onConfirm()"
        class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition"
      >
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>
