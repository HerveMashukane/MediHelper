<div class="dialog-overlay">
  <div class="dialog-panel animate-fadeIn">
    <h3 class="text-lg font-semibold text-white">{{ title }}</h3>

    <p class="mt-2 text-sm text-clinical-muted">
      {{ message }}
      <span *ngIf="highlight" class="font-semibold text-white">{{ highlight }}</span>
      This action cannot be undone!
    </p>

    <div class="form-actions mt-6">
      <button (click)="onCancel()" class="btn-ghost">{{ cancelText }}</button>
      <button (click)="onConfirm()" class="btn-danger">{{ confirmText }}</button>
    </div>
  </div>
</div>
