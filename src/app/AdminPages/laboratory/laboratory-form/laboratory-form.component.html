<section class="form-overlay">
  <form (ngSubmit)="submitLabTest()" class="form-panel">
    <div class="form-panel-header">
      <div>
        <h2 class="form-panel-title">Laboratory Exam Form</h2>
        <p class="text-clinical-muted text-sm mt-1">Laboratory details</p>
      </div>
      <button type="button" (click)="closeForm()" class="form-close-btn">
        <i class="bi bi-x-circle text-2xl"></i>
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="patientName" class="form-label">Patient Name</label>
        <input type="text" placeholder="Type patient name..." [(ngModel)]="formData.patientName" name="formData.patientName" class="clinical-input" />
      </div>
      <div class="flex flex-col">
        <label for="technologistName" class="form-label">Select Technologist</label>
        <select [(ngModel)]="formData.technologistName" name="formData.technologistName" class="clinical-input">
          <option value="" selected>Choose Technologist...</option>
          <option value="Herve">Herve</option>
          <option value="Hiro">Hiro</option>
          <option value="Patricia">Patricia</option>
          <option value="Sylvie">Sylvie</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="status" class="form-label">Test Status</label>
        <select [(ngModel)]="formData.status" name="form.status" class="clinical-input">
          <option value="" selected>Choose status</option>
          <option value="Active">Active</option>
          <option value="Completed">Completed</option>
          <option value="Pending">Pending</option>
          <option value="Canceled">Canceled</option>
          <option value="Critical">Critical</option>
        </select>
      </div>
      <div class="flex flex-col">
        <label for="testType" class="form-label">Select Test type</label>
        <select [(ngModel)]="formData.testType" name="form.testType" class="clinical-input">
          <option value="" selected>Choose test type</option>
          <option value="Blood">Blood</option>
          <option value="Urine">Urine</option>
          <option value="Body">Body</option>
          <option value="HIV">HIV</option>
          <option value="Malaria">Malaria</option>
          <option value="">Other</option>
        </select>
      </div>
    </div>

    <div class="flex flex-col">
      <label for="date" class="form-label">Test Taken Date</label>
      <input type="date" [(ngModel)]="formData.date" name="formData.date" class="clinical-input" />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">
        {{ formData.id ? 'Save Changes' : 'Add Test' }}
      </button>
      <button type="button" (click)="closeForm()" class="btn-danger">Cancel</button>
    </div>
  </form>
</section>
