<section class="form-overlay">
  <form (ngSubmit)="submitRadioExam()" class="form-panel">
    <div class="form-panel-header">
      <div>
        <h2 class="form-panel-title">Radiology Exam Form</h2>
        <p class="text-clinical-muted text-sm mt-1">Exam details</p>
      </div>
      <button type="button" (click)="closeForm()" class="form-close-btn">
        <i class="bi bi-x-circle text-2xl"></i>
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="patientName" class="form-label">Patient Name</label>
        <input type="text" placeholder="Type patient name..." name="formData.patientName" [(ngModel)]="formData.patientName" class="clinical-input" />
      </div>
      <div class="flex flex-col">
        <label for="radiologist" class="form-label">Radiologist</label>
        <select name="formData.radiologist" [(ngModel)]="formData.radiologist" class="clinical-input">
          <option value="" selected>Choose Radiologist...</option>
          <option value="Herve">Herve</option>
          <option value="Hiro">Hiro</option>
          <option value="Patricia">Patricia</option>
          <option value="Sylvie">Sylvie</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="examType" class="form-label">Type</label>
        <select name="formData.examType" [(ngModel)]="formData.examType" class="clinical-input">
          <option value="" selected>Choose exam type</option>
          <option value="X-Ray">X-Ray</option>
          <option value="MRI">MRI</option>
          <option value="CT Scan">CT Scan</option>
          <option value="Ultrasound">Ultrasound</option>
          <option value="">Other</option>
        </select>
      </div>
      <div class="flex flex-col">
        <label for="bodyPart" class="form-label">Select Concerned Body Part</label>
        <select name="formData.bodyPart" [(ngModel)]="formData.bodyPart" class="clinical-input">
          <option value="" selected>Choose part...</option>
          <option value="Chest">Chest</option>
          <option value="Brain">Brain</option>
          <option value="Abdomen">Abdomen</option>
          <option value="Kidney">Kidney</option>
          <option value="Whole">Whole Body</option>
          <option value="">Other</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="status" class="form-label">Exam Status</label>
        <select name="formData.status" [(ngModel)]="formData.status" class="clinical-input">
          <option value="" selected>Select Exam status</option>
          <option value="Pending">Pending</option>
          <option value="In Review">In Review</option>
          <option value="Completed">Completed</option>
          <option value="Urgent">Urgent</option>
        </select>
      </div>
      <div class="flex flex-col">
        <label for="date" class="form-label">Exam Taken Date</label>
        <input type="date" name="formData.date" [(ngModel)]="formData.date" class="clinical-input" />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">
        {{ formData.id ? 'Save Changes' : 'Add Exam' }}
      </button>
      <button type="button" (click)="closeForm()" class="btn-danger">Cancel</button>
    </div>
  </form>
</section>
