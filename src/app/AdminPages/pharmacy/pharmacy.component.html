<section class="page-container animate-pageFlip">

  <!-- ================= TOOLBAR ================= -->
  <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">

    <!-- SEARCH -->
    <input
      type="text"
      placeholder="Search medication..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="searchTerm$.next($event)"
      class="clinical-input w-full lg:w-80"
    />

    <div class="flex flex-col sm:flex-row gap-4">

      <!-- FILTER -->
      <select
        [(ngModel)]="selectedStatus"
        (ngModelChange)="selectedStatus$.next($event)"
        class="clinical-input w-full sm:w-60"
      >
        <option value="All">All Medications</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
        <option value="Completed">Completed</option>
        <option value="Pending">Pending</option>
      </select>

      <!-- PRIMARY ACTION -->
      <button
        (click)="toggleForm()"
        class="btn"
        [ngClass]="isFormVisible ? 'btn-danger' : 'btn-primary'"
      >
        <i [class]="isFormVisible ? 'bi bi-x' : 'bi bi-plus'"></i>
        <span class="ml-2">
          {{ isFormVisible ? 'Close Form' : 'Add Medication' }}
        </span>
      </button>

    </div>

  </div>

  <!-- ================= TABLE ================= -->
  <div class="table-wrapper mt-6">

    <table class="table">

      <thead class="table-head">

        <tr>
          <th class="table-cell">Medication</th>
          <th class="table-cell">Dosage</th>
          <th class="table-cell">Schedule</th>
          <th class="table-cell">Doctor</th>
          <th class="table-cell">Start</th>
          <th class="table-cell">End</th>
          <th class="table-cell">Progress</th>
          <th class="table-cell">Status</th>
          <th class="table-cell">Actions</th>
        </tr>

      </thead>

      <tbody>

        <ng-container *ngIf="filteredMedications$ | async as meds">

          <!-- EMPTY STATE -->
          <tr *ngIf="meds.length === 0">
            <td colspan="9" class="text-center text-clinical-muted py-8">
              No medications found.
            </td>
          </tr>

          <!-- ROWS -->
          <tr
            *ngFor="let med of meds; let i = index"
            class="table-row"
          >

            <td class="table-cell font-semibold">
              {{ med.medName }}
            </td>

            <td class="table-cell">
              {{ med.dosage }} {{ med.dosageUnit }}
            </td>

            <td class="table-cell">
              {{ med.schedule }}
            </td>

            <td class="table-cell text-brand-primary">
              {{ med.doctorName }}
            </td>

            <td class="table-cell">
              {{ med.startDate }}
            </td>

            <td class="table-cell">
              {{ med.endDate }}
            </td>

            <!-- ================= PROGRESS ================= -->
            <td class="table-cell w-44">

              <div class="w-full bg-surface-2 rounded-full h-2 overflow-hidden">

                <div
                  class="h-2 bg-success transition-all duration-300"
                  [style.width.%]="getProgress(med)"
                ></div>

              </div>

              <span class="text-xs text-clinical-muted">
                {{ getProgress(med) }}%
              </span>

            </td>

            <!-- ================= STATUS ================= -->
            <td class="table-cell">

              <span
                class="px-3 py-1 text-xs rounded-full"
                [ngClass]="{
                  'bg-success/20 text-success': med.status === 'Active',
                  'bg-warning/20 text-warning': med.status === 'Pending',
                  'bg-danger/20 text-danger': med.status === 'Inactive',
                  'bg-brand-primary/20 text-brand-primary': med.status === 'Completed'
                }"
              >
                {{ med.status }}
              </span>

            </td>

            <!-- ================= ACTIONS ================= -->
            <td class="table-cell relative">

              <button
                (click)="toggleMenu(i)"
                class="btn btn-ghost px-2 py-1"
              >
                ⋮
              </button>

              <div
                *ngIf="activeMenuIndex === i"
                class="absolute right-2 mt-2 w-44 bg-surface-1 border border-surface-2 rounded-xl shadow-card z-50 overflow-hidden"
              >

                <button class="w-full text-left px-4 py-2 text-brand-primary hover:bg-surface-2">
                  <i class="bi bi-eye-fill mr-2"></i> View
                </button>

                <button
                  (click)="editMedications(med)"
                  class="w-full text-left px-4 py-2 text-warning hover:bg-surface-2"
                >
                  <i class="bi bi-pen mr-2"></i> Edit
                </button>

                <button class="w-full text-left px-4 py-2 text-info hover:bg-surface-2">
                  <i class="bi bi-patch-check-fill mr-2"></i> Adherent
                </button>

                <button
                  (click)="removeMedication(med.id, med.medName)"
                  class="w-full text-left px-4 py-2 text-danger hover:bg-surface-2"
                >
                  <i class="bi bi-trash mr-2"></i> Delete
                </button>

              </div>

            </td>

          </tr>

        </ng-container>

      </tbody>

    </table>

  </div>

</section>
