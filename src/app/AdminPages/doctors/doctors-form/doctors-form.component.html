<section class="form-overlay">
  <form (ngSubmit)="onSubmit()" class="form-panel">

    <div class="form-panel-header">
      <h2 class="form-panel-title">Doctor's Form</h2>
      <button type="button" (click)="onCancel()" class="form-close-btn">
        <i class="bi bi-x-circle text-2xl"></i>
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="fullName" class="form-label">Full Name</label>
        <input [(ngModel)]="formData.fullName" id="fullName" name="fullName" type="text" placeholder="eg: Herve Mashukane" required class="clinical-input mt-1" />
      </div>
      <div class="flex flex-col">
        <label for="preferedName" class="form-label">Preferred Name</label>
        <input [(ngModel)]="formData.preferedName" id="preferedName" name="preferedName" type="text" placeholder="eg: Herve" required class="clinical-input mt-1" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="speciality" class="form-label">Speciality</label>
        <select [(ngModel)]="formData.speciality" id="speciality" name="speciality" required class="clinical-input mt-1">
          <option value="" disabled selected>Select speciality</option>
          <option value="Generalist">Generalist</option>
          <option value="Cardiologist">Cardiologist</option>
          <option value="Dermatologist">Dermatologist</option>
          <option value="Neurologist">Neurologist</option>
          <option value="Surgeon">Surgeon</option>
          <option value="Oncologist">Oncologist</option>
        </select>
      </div>
      <div class="flex flex-col">
        <label for="hospital" class="form-label">Hospital</label>
        <input [(ngModel)]="formData.hospital" id="hospital" name="hospital" type="text" placeholder="eg: Heal Africa" required class="clinical-input mt-1" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label for="email" class="form-label">Email</label>
        <input [(ngModel)]="formData.email" id="email" name="email" type="email" placeholder="eg: hervemashukane@gmail.com" required class="clinical-input mt-1" />
      </div>
      <div class="flex flex-col">
        <label for="phone" class="form-label">Phone</label>
        <input [(ngModel)]="formData.phone" id="phone" name="phone" type="tel" placeholder="eg: +243979594795" required class="clinical-input mt-1" />
      </div>
    </div>

    <div class="flex flex-col">
      <label for="image" class="form-label">Profile Picture</label>
      <input type="file" id="image" (change)="onFileSelected($event)" name="image" class="clinical-input mt-1" />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">
        {{ formData.id ? 'Save Changes' : 'Add Doctor' }}
      </button>
      <button type="button" (click)="onCancel()" class="btn-danger">
        Cancel
      </button>
    </div>
  </form>
</section>
