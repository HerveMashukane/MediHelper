<section class="flex flex-col">
    <h2 class="text-2xl text-blue-500 font-semibold">My Doctors</h2>

    <!-- filters -->
    <div class="flex justify-between">
        <input type="search" placeholder="Search doctor..." class="border rounded-md px-4 py-2 ring-1 ring-blue-500 outline-blue-500">
        <select class="bg-blue-100 p-2 text-gray-900">
            <option value="All" selected>All specialists</option>
            <option value="Generalist">Generalist</option>
            <option value="Cardiologist">Cardiologist</option>
            <option value="Dermatologist">Dermatologist</option>
            <option value="Neurologist">Neurologist</option>
            <option value="Surgerist">Surgerist</option>
            <option value="Oncologist">Oncologist</option>
        </select>
    </div>

    <!-- doctor cards -->
    <div class="grid grid-cols-3 gap-4 pt-8">
        <div *ngFor="let doctor of doctors" class="flex flex-col items-center bg-white p-4 space-y-2 shadow-lg">
            <div class="space-y-2">
                <p>{{ doctor.preferedName }}</p>
                <img [src]="doctor.image" [alt]="doctor.alt" class="w-20 h-20 rounded-full">
                <p>{{ doctor.fullName }}</p>
                <p>{{ doctor.speciality }}</p>
            </div>
            <div>
                <button>{{ doctor.viewBtn }}</button>
                <button>{{ doctor.cancelBtn }}</button>
            </div>
        </div>
    </div>
</section>
