<section class="p-10 bg-gray-950 space-y-4 animate-pageFlip">
    <h2 class="text-2xl text-white font-semibold">Bookings</h2>

    <!-- Appointment form + avalable slots -->
    <div class="flex justify-between gap-4">
        <!-- appointment form -->
        <form class="text-gray-900 space-y-4 bg-gray-900 p-8 shadow-lg rounded-md w-full">
            <h3 class="text-lg text-white font-semibold">Book an Appointment</h3>
            <!-- patient name -->
            <div class="flex flex-col space-y-2">
                <label for="name" class="text-white font-medium">Patient Name</label>
                <input type="text" placeholder="Type patient name..." class="bg-gray-950 text-white border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-950">
            </div>

            <!-- patient doctor -->
            <div class="flex flex-col space-y-2">
                <label for="doctor" class="text-white font-medium">Select Doctor</label>
                <select name="doctor" class="p-2 bg-gray-950 text-white border border-gray-700 rounded-md focus:outline-none focus:outline-blue-950">
                    <option value="" disabled selected>Choose Doctor...</option>
                    <option value="Dr. Herve">Dr. Herve</option>
                    <option value="Dr. Hiro">Dr. Hiro</option>
                    <option value="Dr. Christelle" class="hover:bg-gray-800">Dr. Christelle</option>
                </select>
            </div>

            <!-- appointment date -->
            <div class="flex flex-col space-y-2">
                <label for="date" class="text-white font-medium">Date</label>
                <input type="date" name="date" class="bg-gray-950 text-white border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-950">
            </div>

            <!-- appointment time -->
            <div class="flex flex-col space-y-2">
                <label for="time" class="text-white font-medium">Time</label>
                <input type="time" name="time" class="bg-gray-950 text-white border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-950">
            </div>

            <!-- additional information -->
            <div class="flex flex-col space-y-2">
                <label for="message" class="text-white font-medium">Notes</label>
                <textarea 
                    name="note" 
                    cols="30" 
                    rows="5" 
                    class="bg-gray-950 text-white border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-950"
                    placeholder="Type additional information">
                </textarea>
            </div>
            <!-- appointment button -->
            <div>
                <button class="bg-blue-950 text-white py-2 px-5 rounded-md hover:bg-blue-900 transition">
                    Book Appointment
                </button>
            </div>
        </form>

        <!-- AVAILABLE SLOTS + TEXT -->
        <div class="flex flex-col bg-gray-900 p-8 shadow-lg rounded-md w-full space-y-4">
            <!-- text -->
            <div>
                <h3 class="text-lg text-white font-semibold">
                    Available Slots
                </h3>
            </div>
            <!-- slots -->
            <div class="grid grid-cols-4 gap-3">
                <div *ngFor="let slot of slots">
                    <p class="flex flex-col bg-gray-950 p-2 text-white items-center shadow-2xl rounded-lg">
                        {{ slot.hour }}
                        <span>{{ slot.meridiem }}</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
