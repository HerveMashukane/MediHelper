<section class="p-8 bg-gray-950 text-white min-h-screen">

    <!-- HEADER -->
    <div class="mb-6">
        <h1 class="text-3xl font-semibold">Settings</h1>
        <p class="text-gray-400 text-sm">
            Manage your account and system preferences
        </p>
    </div>


    <div class="grid grid-cols-4 gap-6">

        <!-- LEFT MENU -->
        <aside class="bg-gray-900 rounded-xl border border-gray-800 p-4 space-y-2">

            <button (click)="activeTab='profile'"
                [ngClass]="activeTab==='profile' ? 'bg-blue-700' : 'hover:bg-gray-800'"
                class="w-full text-left px-4 py-2 rounded-lg">
                Profile
            </button>

            <button (click)="activeTab='security'"
                [ngClass]="activeTab==='security' ? 'bg-blue-700' : 'hover:bg-gray-800'"
                class="w-full text-left px-4 py-2 rounded-lg">
                Security
            </button>

            <button (click)="activeTab='notifications'"
                [ngClass]="activeTab==='notifications' ? 'bg-blue-700' : 'hover:bg-gray-800'"
                class="w-full text-left px-4 py-2 rounded-lg">
                Notifications
            </button>

            <button (click)="activeTab='appearance'"
                [ngClass]="activeTab==='appearance' ? 'bg-blue-700' : 'hover:bg-gray-800'"
                class="w-full text-left px-4 py-2 rounded-lg">
                Appearance
            </button>

        </aside>


        <!-- RIGHT CONTENT -->
        <div class="col-span-3 space-y-6">

            <!-- PROFILE -->
            <div *ngIf="activeTab==='profile'" class="bg-gray-900 p-6 rounded-xl border border-gray-800 space-y-4">

                <h2 class="text-lg font-semibold">Profile Information</h2>

                <input type="text" placeholder="Full Name"
                    class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3">

                <input type="email" placeholder="Email"
                    class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3">

                <button class="bg-blue-700 px-5 py-2 rounded-lg">
                    Save Profile
                </button>

            </div>


            <!-- SECURITY -->
            <div *ngIf="activeTab==='security'" class="bg-gray-900 p-6 rounded-xl border border-gray-800 space-y-4">

                <h2 class="text-lg font-semibold">Security</h2>

                <input type="password" placeholder="Current Password"
                    class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3">

                <input type="password" placeholder="New Password"
                    class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3">

                <button class="bg-red-700 px-5 py-2 rounded-lg">
                    Update Password
                </button>

            </div>


            <!-- NOTIFICATIONS -->
            <div *ngIf="activeTab==='notifications'" class="bg-gray-900 p-6 rounded-xl border border-gray-800 space-y-4">

                <h2 class="text-lg font-semibold">Notifications</h2>

                <div class="flex justify-between">
                    <span>Email Notifications</span>
                    <input type="checkbox">
                </div>

                <div class="flex justify-between">
                    <span>SMS Notifications</span>
                    <input type="checkbox">
                </div>

                <div class="flex justify-between">
                    <span>Push Notifications</span>
                    <input type="checkbox">
                </div>

                <button class="bg-blue-700 px-5 py-2 rounded-lg">
                    Save Preferences
                </button>

            </div>


            <!-- APPEARANCE -->
            <div *ngIf="activeTab==='appearance'" class="bg-gray-900 p-6 rounded-xl border border-gray-800 space-y-4">

                <h2 class="text-lg font-semibold">Appearance</h2>

                <div class="flex justify-between">
                    <span>Dark Mode</span>
                    <input type="checkbox" checked>
                </div>

                <button class="bg-blue-700 px-5 py-2 rounded-lg">
                    Save Appearance
                </button>

            </div>

        </div>

    </div>

</section>
