<section class="bg-gray-950 p-10 text-white animate-pageFlip">
    <!-- Appointment header + filter buttons & add appointment btn -->
    <div class="space-y-4">
        <h2 class="text-2xl font-semibold">
            Appointments
        </h2>
        <div class="flex justify-between pb-2">
            <!-- filter buttons -->
            <div class="flex flex-wrap space-x-2">
                <button class="bg-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-900 transition">
                    All
                </button>
                <button class="border border-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-950 transition">
                    Upcoming
                </button>
                <button class="border border-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-950 transition">
                    Completed
                </button>
                <button class="border border-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-950 transition">
                    Pending
                </button>
                <button class="border border-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-950 transition">
                    Canceled
                </button>
                <input type="search" placeholder="Search appointement..." class="bg-gray-950 text-white border border-blue-950 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-950"/>
            </div>
            <!-- add appointment btn -->
            <div>
                <button class="bg-blue-950 text-white py-2 px-5 rounded-md hover:bg-blue-900 transition">
                    <i class="fa-solid fa-plus"></i>
                    Add Appointment
                </button>
            </div>
        </div>
        <h2 class="text-xl font-semibold pb-2">
            All Appointments
        </h2>
    </div>
    <!-- patient appointments table -->
    <table class="w-full bg-gray-900 text-white">
        <thead>
            <tr class="border text-left text-xl font-semibold">
                <th class="border-2 border-gray-600 p-2">Patient</th>
                <th class="border-2 border-gray-600 p-2">Doctor</th>
                <th class="border-2 border-gray-600 p-2">Date</th>
                <th class="border-2 border-gray-600 p-2">Time</th>
                <th class="border-2 border-gray-600 p-2">Status</th>
                <th class="border-2 border-gray-600 p-2">Actions</th>
            </tr>
        </thead>

        <tbody *ngFor="let appointment of patientAppointments">
            <tr class="border-2 border-gray-600">
                <td class="py-3 border-2 border-gray-600 px-2">{{ appointment.patientName }}</td>
                <td class="py-3 border-2 border-gray-600 px-2">{{ appointment.doctorName }}</td>
                <td class="py-3 border-2 border-gray-600 px-2">{{ appointment.date }}</td>
                <td class="py-3 border-2 border-gray-600 px-2">{{ appointment.time }}</td>
                <td class="py-3 border-2 border-gray-600 px-2">
                    <button 
                        class="px-2 py-1 rounded-full"
                        [ngClass]="{
                            'bg-blue-800 text-white hover:bg-blue-700 transition': appointment.status === 'Completed',
                            'bg-yellow-800 text-white hover:bg-yellow-700 transition': appointment.status === 'Pending',
                            'bg-red-800 text-white hover:bg-red-700 transition': appointment.status === 'Canceled'
                        }">
                        {{ appointment.status }}
                    </button>
                </td>
                <td class="flex py-3 px-2 space-x-4">
                    <button class="bg-blue-800 text-white px-4 py-1 hover:bg-blue-700 rounded-full transition">
                        {{ appointment.viewBtn }}
                    </button>
                    <button class="bg-yellow-800 text-white px-4 py-1 hover:bg-yellow-700 rounded-full transition">
                        {{ appointment.editBtn }}
                    </button>
                    <button class="bg-red-800 px-4 py-1 text-white hover:bg-red-700 rounded-full transition">
                        {{ appointment.cancelBtn }}
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</section>
