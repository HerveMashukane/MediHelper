<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediHelp Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Overlay -->
  <div class="fixed inset-0 bg-black/60 flex items-center justify-center">

    <!-- Modal -->
    <div class="bg-gray-900 text-white w-full max-w-md p-8 rounded-2xl shadow-2xl">

      <!-- Header -->
      <div class="text-center">
        <img 
          src="branding/logo.svg"
          alt="MediHelp Logo"
          class="h-12 mx-auto mb-4"
        />

        <h2 class="text-xl font-semibold">Admin Login</h2>
        <p class="text-gray-400 text-sm mt-2">
          Hospital Operations Platform
        </p>
      </div>

      <!-- Form -->
      <form class="mt-6 space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm text-gray-300 mb-1">
            Admin Email
          </label>
          <input
            type="email"
            placeholder="Enter your email"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm text-gray-300 mb-1">
            Admin Password
          </label>
          <input
            type="password"
            placeholder="Enter your password"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition"
          />
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-sky-600 hover:bg-sky-700 transition duration-200 py-2 rounded-lg font-medium shadow-lg"
        >
          Login
        </button>
      </form>
    </div>
  </div>

</body>
</html>
